<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moodoo - Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        :root {
            --bg: #090909;
            --panel: rgba(0, 0, 0, 0.82);
            --accent: #e50914;
            --text: #ffffff;
            --text-muted: #cccccc;
            --border: rgba(255, 255, 255, 0.12);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #121212 0%, #050505 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        .dashboard-shell {
            width: min(980px, 100%);
            background: rgba(0, 0, 0, 0.78);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 40px 120px rgba(0,0,0,0.45);
            display: grid;
            gap: 30px;
            text-align: center;
        }
        h1 {
            font-size: clamp(2.5rem, 4vw, 4rem);
            line-height: 1.05;
        }
        p {
            color: var(--text-muted);
            line-height: 1.8;
            font-size: 1rem;
            max-width: 720px;
            margin: 0 auto;
        }
        .actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .button,
        .logout-button {
            border: none;
            border-radius: 999px;
            padding: 14px 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .button {
            background: var(--accent);
            color: white;
        }
        .logout-button {
            background: rgba(255,255,255,0.08);
            color: var(--text);
        }
        .button:hover,
        .logout-button:hover {
            transform: translateY(-2px);
        }
        .status {
            color: #7ef3a1;
            font-size: 1rem;
        }
        @media (max-width: 640px) {
            .dashboard-shell {
                padding: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-shell">
        <div>
            <h1 data-text="welcomeTitle">Vítejte v Moodoo</h1>
            <p data-text="welcomeText">Zde můžete pokračovat ke svému obsahu a spravovat svůj účet.</p>
        </div>
        <div class="status" id="status"></div>
        <div class="actions">
            <button class="button" id="go-home">Zpět na domovskou stránku</button>
            <button class="logout-button" id="logout">Odhlásit</button>
        </div>
    </div>
    <script>
        const storedUser = localStorage.getItem('moodooCurrentUser');
        const status = document.getElementById('status');
        const goHome = document.getElementById('go-home');
        const logout = document.getElementById('logout');

        if (!storedUser) {
            window.location.href = 'po_prihlaseni.html';
        } else {
            const user = JSON.parse(storedUser);
            status.textContent = `Přihlášen jako ${user.name} (${user.email}).`;
        }

        goHome.addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        logout.addEventListener('click', () => {
            localStorage.removeItem('moodooCurrentUser');
            window.location.href = 'po_prihlaseni.html';
        });
    </script>
</body>
</html>
