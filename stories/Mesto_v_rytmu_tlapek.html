    <script>
        const storyNodes = {
            uvod: {
                text: `Město večer chutná jako kov, ozón a příslib blížící se bouřky, která visí nízko nad střechami domů. Vzduch je těžký, nasycený vlhkostí, ale pro tebe je to to nejlepší palivo. Tvůj dech je pravidelný, hluboký a kovový, přesně synchronizovaný s rytmickými údery tvých tenisek o hrubý asfalt chodníku. Každý krok cítíš až v páteři – je to čistý, mechanický pohyb, který tě zbavuje všech starostí dne.
                    Vedle tebe, v dokonalém polostinu pouličních lamp, kluše Max. Je to velký kříženec s hrudníkem atleta a nekonečnou zásobou energie, která jako by se s každým kilometrem jen doplňovala. Jeho srst v záři oranžových výbojek hází stříbrné odlesky a jeho svaly pod kůží pracují s fascinující lehkostí. Tohle je váš posvátný moment, rituál, který patří jen vám dvěma. Svět kolem vás přestal existovat jako soubor budov a ulic; proměnil se v rozmazanou šmouhu neonových světel z kaváren, mihotavých výloh a protijedoucích aut, jejichž světlomety krájí tmu jako žiletky.
                    „Ještě kousek, Maxíku, už budeme u parku,“ vydechneš do chladnoucího vzduchu a tvůj hlas se mísí se šumem města. Pes v odpověď radostně štěkne, krátce a energicky, aniž by vypadl z tempa. V tu chvíli se cítíš neporazitelně, jako bys dokázal běžet až na konec světa, poháněn jen touhle syrovou energií.
                    Jenže pak se před vámi otevře prostor křižovatky u Hlavní třídy. Je to skutečná tepna města, monstrózní asfaltový uzel, kde doprava neustále pulzuje jako splašená krev v žilách unaveného obra. Z dálky slyšíš dunění motorů a skřípění brzd. Upřeš oči na semafor. Vidíš tu malou zelenou postavičku, která právě začíná nervózně blikat.
                    V hlavě ti okamžitě naskočí vnitřní stopky. Máš maximálně dvě vteřiny na rozhodnutí. Tvůj mozek vyhodnocuje vzdálenost, rychlost a únavu v nohách – “Stihnu to?” Jenže Max je v tu chvíli o půl metru napřed, vybičovaný společným tempem a soustředěný jen na cestu před sebou.
                    Vteřina jedna: tvoje tělo se napíná k poslednímu skoku. Vteřina dvě: malý panáček na semaforu zhasne a vystřídá ho neúprosná, krvavě rudá barva.
                    Červená naskočí přesně v milisekundě, kdy Maxovy přední tlapky dopadnou na bílou barvu přechodu. Svět kolem jako by na moment zamrzl v tichu, které vzápětí roztrhne brutální realita velkoměsta. Zleva, jen pár metrů od vás, se ozve hladové túrování motoru těžkého černého SUV. Řidič má zelenou, nudu v očích a nohu na plynu. Auto sebou trhne vpřed právě ve chvíli, kdy se Max chystá k dalšímu odrazu přímo do jeho dráhy.
`,
                choices: [
                    { text: "A) Běžet dál", nextNode: 'bezet_dal' },
                    { text: "B) Zastavit a čekat", nextNode: 'zastavit' },
                    { text: "C) Škubnout vodítkem", nextNode: 'skubnout' }

            bezet_dal: {
                text: `Adrenalin ti vystřelí do žil jako elektrický proud. Vteřina se natáhne do nekonečna. Mozek ti bleskově vypočítá jedinou šanci: pokud teď zastavíš, Maxe neudržíš a on skončí pod koly. Pokud ale zrychlíš, možná, jen možná, proletíte tou smrtící zónou dřív, než vás SUV smete.
                    „Sakra, Maxi, makej!“ zařveš tak silně, až tě pálí v krku.
                    Místo abys brzdil, vrazíš veškerou zbývající energii do stehen. Tvoje tenisky doslova vybuchnou na asfaltu. Skočíš vpřed, nataženou pravicí pevně svíráš rukojeť vodítka a levou rukou se snažíš Maxe popohnat. Cítíš, jak se ti svaly napínají k prasknutí.
                    Max, vybičovaný tvým řevem a náhlým nárůstem tempa, vyrazí jako šíp. Cítíš horko sálající z chladiče toho černého kolosu. Slyšíš to zlověstné zasyčení pneumatik, jak řidič v poslední setině vteřiny dupne na brzdu. Světlomety SUV ti ozáří bok tak silně, že na zlomek sekundy nevidíš nic než bílou tmu.
                    TÚÚÚÚÚÚÚÚÚÚT!
                    Ten zvuk je ohlušující. Je v něm všechno – vztek, leknutí i smrtelná hrozba. Cítíš tlakovou vlnu vzduchu, jak auto zastavuje jen pár centimetrů od tvé paty. Je to tak blízko, že cítíš pach spálené gumy a prach z brzdových destiček.
                    Doskočíte na druhou stranu přechodu. Tvoje plíce hoří, v uších ti buší krev a nohy se ti třesou jako osiky. Max se zastaví, ohlédne se a zmateně zamrtá ocasem. Nechápe, co se právě stalo, cítí jen tvůj strach a vzrušení.
                    Zastavíš se a opřeš se rukama o kolena, abys neupadl. Černé SUV tam stále stojí, uprostřed křižovatky, jako obří kovová bestie. Okénko u řidiče se pomalu spouští dolů. Vyhlédne z něj muž s rudým obličejem, žíly na krku mu nabíhají.
                    „Seš normální?!“ zařve na celou ulici. „Moh’ jsem vás oba zabít, ty blázne! Co si jako myslíš?!“
                    Lidé na zastávce opodál se otáčejí. Cítíš na sobě jejich pohledy – některé odsuzující, jiné vyděšené. Máš v sobě tolik nahromaděného napětí, že se ti chce buď brečet, nebo na něj začít řvát taky.
`,
                choices: [
                    { text: "A) Ukázat na něj prostředníček", nextNode: 'gesto' },
                    { text: "B) Omluvit se a zmizet", nextNode: 'omluva' },
                    { text: "C) Prostě běžet dál", nextNode: 'utek' }

            },
            gesto: {
                text: `Hněv v tobě vyvře jako láva. Vteřina, kdy jsi mohl jen sklonit hlavu a odejít, je pryč. Adrenalin, který ti měl pomoci utéct, se teď transformoval do čisté, nekontrolované agrese. Máš pocit, že celý svět je proti tobě a tohle černé SUV je jeho symbolem.
                „Měl jsi vidět, že tam jsme, ty kreténe! Jel jsi jako naprostý hovado!“ zařveš tak silně, až ti naskočí žíla na spánku. Uděláš dva rázné kroky směrem k autu, ruku sevřenou v pěst.
                Řidič, chlap v drahém obleku, kterému právě strach o vlastní lak přerostl v aroganci, práskne dveřmi a vystoupí. „Co jsi to řekl, ty harante?! Červená ti nic neříká?“ křičí a kráčí k tobě. Situace vře. Lidé na zastávce vytahují mobily, cítíš se jako v aréně.
                Max vycítí napětí. Naježí se a začne hluboce, výhružně vrčet. To tě vyprovokuje ještě víc. Místo abys situaci uklidnil, zastavíš se, narovnáš se a s pohrdavým úšklebkem zvedneš ruku přímo před jeho obličej.
                Vztyčíš prostředníček. Pomalu, provokativně, s ledovým klidem v očích.
                „Tady máš odpověď,“ procedíš mezi zuby.
                Tím jsi ale překročil neviditelnou čáru. Řidič zrudne, ale než stihne cokoli udělat, ozve se ostré syknutí brzd. Hned vedle vás zastavuje bílo-modré auto s majáky. Městská policie. Byli hned za rohem.
                Strážníci vyskakují z auta. Scéna je jasná: uprostřed křižovatky blokuje provoz SUV, u něj stojí nepříčetný řidič a naproti němu ty – s agresivním psem a vulgárním gestem, které stále visí ve vzduchu.
                „Občanský průkaz, hned!“ zahřmí policista.
                Tvoje hrdinství se během vteřiny vypaří. Musíš strávit další hodinu vysvětlováním, proč jsi vběhl na červenou a proč jsi vyvolal konflikt. Řidič sice dostane domluvu za rychlou jízdu, ale ty odcházíš s tučnou pokutou za ohrožení provozu a neukázněné chování.
                Domů se vracíš pěšky, s prázdnou peněženkou a pachem ostudy. Max jde se sklopenou hlavou, jako by cítil tvoji porážku. Dnešní běh neměl vítěze. Jen tvůj vztek, který tě stál víc, než jsi byl ochoten zaplatit.
                `,
                endTitle: "--- ALTERNATIVNÍ KONEC #1: Fakáč! ---",
                choices: []
            },
            omluva: {
                text: `Hlasitý křik řidiče se ti zařezává do uší jako cirkulárka. Cítíš, jak se ti třesou ruce. První instinkt ti radí zařvat na něj něco stejně hnusného, ale když se podíváš na Maxe, vidíš, jak se pes tiskne k tvé noze. Je vyděšený. Ten hluk, troubení a tvoje agrese by ho jen víc rozhodily.
                Polkneš žluč, která se ti drala do hrdla. Zvedneš volnou ruku v tichém, upřímném gestu omluvy.
                „Promiňte! Moje chyba!“ křikneš směrem k autu. Tvůj hlas zní trochu přiškrceně, jak se snažíš popadnout dech. Nečekáš na jeho reakci, ani na to, jestli tě dál bude častovat nadávkami. Prostě skloníš hlavu, pevněji stiskneš vodítko a co nejrychleji odtáhneš Maxe pryč z té záře reflektorů, do milosrdného stínu parku, který začíná hned za rohem.
                Jakmile pod nohama ucítíš místo asfaltu měkkou mlatovou cestu, konečně se zastavíš. Max si sedne na trávu a začne se olizovat, jako by ze sebe chtěl ten stres smýt. Ty se opřeš zády o kmen starého dubu a pomalu vydechuješ. Srdce ti v hrudi tluče jako uvězněný pták.
                „Teda, vy si taky koledujete o infarkt,“ ozve se najednou z lavičky kousek od tebe klidný, lehce pobavený ženský hlas.
                Trhneš sebou a podíváš se tím směrem. Ve světle vzdálené lampy sedí Lucka, tvoje kamarádka, kterou jsi neviděl snad celou věčnost. Vedle ní leží rozevřená kniha a v ruce drží kelímek s kávou.
                `,

                { text: "Pozvat ji na kafe", nextNode: 'kafe' }

            utek: {
                text: `V uších ti duní vlastní tep a nadávky řidiče slyšíš jen jako vzdálený, nepodstatný šum. Tvoje tělo je v šoku, přepnuté do nejzákladnějšího režimu: přežít a zmizet. Nechceš slyšet jeho hněv, nechceš vidět ty odsuzující pohledy lidí na zastávce. Potřebuješ ten pocit nebezpečí nechat za sebou.
                „Pojď, Maxi!“ vyrazíš znovu do běhu.
                Tvoje nohy, ačkoliv se ještě před chvílí třásly, teď pracují jako stroje. Max, zmatený tou náhlou vlnou napětí, běží těsně u tvého boku. Kličkujete mezi chodci, probíháte úzkou uličkou kolem starého kina a míříte do hloubi městského parku, kde světla ubývá a ticho narůstá.
                Běžíš takhle dalších deset minut. Plíce tě pálí, jako bys vdechoval střepy, a v boku tě nepříjemně píchá. Konečně, u dřevěného altánu uprostřed tiché části parku, se zastavíš. Předkloníš se, ruce si opřeš o stehna a lapáš po dechu.
                „Panebože... to bylo... o fous,“ soukáš ze sebe mezi jednotlivými nádechy.
                „O fous? Vypadáš, jako bys právě utekl z vlastní popravy,“ ozve se najednou kousek od tebe známý, klidný hlas.
                Zvedneš hlavu. Na lavičce u altánu sedí Lucka. Má na sobě běžeckou bundu a vedle ní na zemi leží otevřená láhev s vodou. Vypadá to, že si tu taky dávala pauzu. Dívá se na tebe se směsicí pobavení a opravdové starosti.
                „Luci?“ vydechneš překvapeně. „Co tu... co tu děláš?“
                „Dneska jsem si řekla, že vyčistím hlavu po tom příšerném dni v práci,“ usměje se Lucka a poklepe na místo vedle sebe. „Ale ty vypadáš, že tu hlavu máš spíš v plamenech. Sedni si, než sebou sekneš. Max už vypadá, že to za tebe vzdal.“
                `,
                choices: [{ text: "Sednout si k ní", nextNode: 'sednout' },
                { text: "Jen zamávat a pokračovat", nextNode: 'jit_dal' }
                ]
            },
            zastavit: {
                text: `„MAXI, STŮJ!“ zařveš a vší silou se zapřeš patami o drsný asfalt.
                Tvé tělo funguje jako kotva. Max, i když už byl předními tlapkami na přechodu, cítí tvůj prudký stop a poslušně se stáhne zpět na obrubník. V tu samou sekundu kolem vás prosvype černé SUV. Cítíš ten poryv horkého vzduchu a prachu, jak těsně míjí Maxův čumák. Kdybys neudělal tenhle krok zpět, ten večer by skončil krví.
                Stojíš tam, srdce ti buší až v krku a sleduješ, jak se na semaforu neúprosně drží červená. Max si sedne, podívá se na tebe svýma hnědýma očima a olízne si čumák, jako by chtěl říct: „To bylo o fous, co?“
                „Teda, vy si taky koledujete o infarkt,“ ozve se najednou kousek od tebe klidný, lehce pobavený ženský hlas.
                Trhneš sebou a ohlédneš se. U zábradlí kousek od přechodu stojí Lucka. Tvoje spolužačka, kterou jsi neviděl snad celou věčnost. Má na sobě běžeckou bundu, v uších sluchátka stažená kolem krku a v ruce drží kelímek s kávou, ze kterého se ještě kouří. Vypadá to, že tu taky čeká na zelenou, nebo se jen zastavila, aby nabrala dech.
                „Luci?“ vydechneš překvapeně a konečně povolíš křečovité sevření vodítka. „Skoro jsi mě nepoznala, co? V tomhle světle a v tomhle sprintu...“
                „Poznala jsem spíš Maxe,“ usměje se a ukáže na psa. „Ten tvůj styl běhu je pořád stejně urputný. Ale vážně, skoro jsi tam vlítnul. Máš štěstí, že máš tak chytrého psa, který tě poslechne na slovo.“
                Stojíte tam, zatímco město kolem vás pulzuje. Červená na semaforu jako by tam byla schválně, aby vám dala pár vteřin času navíc. Adrenalin z tebe pomalu vyprchává a nahrazuje ho nečekaná radost z toho, že vidíš někoho známého.
                `,

// --- POMOCNÉ FUNKCE ---

// Funkce, která vysekne jen název za dvojtečkou (např. z "KONEC: Fakáč" udělá "Fakáč")
function getCleanTitle(fullTitle) {
    if (!fullTitle) return "Neznámý osud";
    const parts = fullTitle.split(':');
    const title = parts.length > 1 ? parts[1] : parts[0];
    return title.replace(/---/g, '').trim();
}

// --- LOGIKA HRY ---

function showNode(nodeId) {
    const node = storyNodes[nodeId];
    const textElement = document.getElementById('text');
    const choicesElement = document.getElementById('choices');
    const timerElement = document.getElementById('timer');

    clearInterval(countdown);
    timerElement.style.display = 'none';
    textElement.innerText = node.text;
    choicesElement.innerHTML = '';
    window.scrollTo(0, 0);

    if (node.choices && node.choices.length > 0) {
        const startBtn = document.createElement('button');
        startBtn.innerText = "ROZHODNOUT SE (7s)";
        startBtn.classList.add('action-btn');

        startBtn.onclick = () => {
            startBtn.remove();
            renderChoices(node.choices);
            startTimer(7, node.choices);
        };
        choicesElement.appendChild(startBtn);
    } else {
        renderEnd(node);
    }
}

function renderChoices(choices) {
    const choicesElement = document.getElementById('choices');
    choices.forEach(choice => {
        const button = document.createElement('button');
        button.innerText = choice.text;
        button.classList.add('choice-btn');
        button.onclick = () => {
            clearInterval(countdown);
            showNode(choice.nextNode);
        };
        choicesElement.appendChild(button);
    });
}

function startTimer(seconds, choices) {
    const timerElement = document.getElementById('timer');
    timerElement.style.display = 'block';
    let timeLeft = seconds;
    timerElement.innerText = timeLeft;

    countdown = setInterval(() => {
        timeLeft--;
        timerElement.innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(countdown);
            const randomIndex = Math.floor(Math.random() * choices.length);
            const randomChoice = choices[randomIndex];
            showNode(randomChoice.nextNode);
        }
    }, 1000);
}

// --- OBRAZOVKY (MOODOO DESIGN) ---

function renderEnd(node) {
    const choicesElement = document.getElementById('choices');
    const fullTitle = node.endTitle || "--- KONEC ---";
    const cleanTitle = getCleanTitle(fullTitle);

    localStorage.setItem('lastPlayTime', Date.now());
    
    if (!localStorage.getItem('firstEnd')) {
        localStorage.setItem('firstEnd', cleanTitle);
    }

    const firstEnd = localStorage.getItem('firstEnd');

    // Vytvoříme hlavní kontejner
    const endDiv = document.createElement('div');
    endDiv.className = 'moodoo-screen';
    
    // 1. FÁZE: Zobrazíme jen tlačítko pro odemknutí
    endDiv.innerHTML = `
        <div id="unlock-section" style="text-align: center; margin-top: 40px;">
            <p style="color: #666; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; margin-bottom: 20px;">Tvůj příběh je u konce...</p>
            <button class="moodoo-btn" onclick="revealFate()" style="background: linear-gradient(145deg, #362f27, #241a1a); border-color: #d93838; padding: 20px 40px; font-size: 0,7rem;">
                ODEMKNOUT SVŮJ KONEC
            </button>
        </div>

        <div id="fate-card" style="display: none; opacity: 0; transform: translateY(20px); transition: all 0.5s ease;">
            <div class="moodoo-card">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#DAA050" stroke-width="2" style="margin-bottom: 20px;">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                </svg>
                <div class="moodoo-card-label">Tvůj vyložený osud:</div>
                <div class="moodoo-card-title" style="font-size: 1.8rem; margin: 10px 0 20px 0;">${cleanTitle}</div>
                <div class="moodoo-card-link" onclick="window.location.href='#diskuze'">Diskuze</div>
            </div>

            <div style="margin-bottom: 30px; text-align: center; opacity: 0.8;">
                <p style="font-size: 0.75rem; color: #666; text-transform: uppercase; margin-bottom: 5px;">Tvůj historicky první konec:</p>
                <p style="color: #DAA050; font-size: 1rem; font-weight: bold; margin: 0;">${firstEnd}</p>
            </div>

            <button class="moodoo-btn" onclick="handleRestart()">Zkusit jinou cestu</button>
        </div>
    `;

    choicesElement.appendChild(endDiv);
}

// 2. FÁZE: Funkce pro odhalení (animace)
function revealFate() {
    const unlockSection = document.getElementById('unlock-section');
    const fateCard = document.getElementById('fate-card');

    unlockSection.style.display = 'none';
    fateCard.style.display = 'block';
    
    // Krátký timeout pro spuštění CSS animace
    setTimeout(() => {
        fateCard.style.opacity = '1';
        fateCard.style.transform = 'translateY(0)';
    }, 10);
}

function initGame() {
    const lastPlay = localStorage.getItem('lastPlayTime');
    const firstEndRaw = localStorage.getItem('firstEnd');
    const textElement = document.getElementById('text');
    const choicesElement = document.getElementById('choices');
    const timerElement = document.getElementById('timer');

    if (lastPlay && (Date.now() - parseInt(lastPlay) < COOLDOWN_TIME)) {
        const nextPlayDate = new Date(parseInt(lastPlay) + COOLDOWN_TIME);
        const hours = nextPlayDate.getHours().toString().padStart(2, '0');
        const minutes = nextPlayDate.getMinutes().toString().padStart(2, '0');

        timerElement.style.display = 'none';

        // Pokud v paměti už je první konec, použijeme ho, jinak dáme placeholder
        const firstEndDisplay = firstEndRaw ? firstEndRaw : "Zatím neznámý";

        textElement.innerHTML = `
            <div class="moodoo-screen">
                <p class="moodoo-status-text">Příběh je možné hrát jednou za hodinu.<br>
                Můžeš se vrátit v <b>${hours}:${minutes}</b></p>

                <div class="moodoo-card">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#DAA050" stroke-width="1.5">
                        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>
                        <path d="M10 2v8l3-3 3 3V2"></path>
                    </svg>
                    <div class="moodoo-card-label">Tvůj první konec:</div>
                    <div class="moodoo-card-title">${firstEndDisplay}</div>
                    <div class="moodoo-card-link" onclick="window.location.href='#diskuze'">Diskuze</div>
                </div>
            </div>
        `;
        choicesElement.innerHTML = '';
    } else {
        showNode('uvod');
    }
}

// --- OSTATNÍ FUNKCE ---

function handleRestart() {
    const lastPlay = localStorage.getItem('lastPlayTime');
    if (lastPlay) {
        const timePassed = Date.now() - parseInt(lastPlay);
        if (timePassed < COOLDOWN_TIME) {
            initGame();
            return;
        }
    }
    localStorage.removeItem('lastPlayTime');
    showNode('uvod');
}

window.addEventListener('keydown', (e) => {
    inputBuffer += e.key.toLowerCase();
    if (inputBuffer.length > 10) inputBuffer = inputBuffer.substring(1);

    if (inputBuffer.includes("skip")) {
        inputBuffer = "";
        localStorage.removeItem('lastPlayTime');
        localStorage.removeItem('firstEnd');
        alert("Admin: Limit a historie vyresetovány.");
        location.reload();
    }
});

// START
initGame();
    </script>
