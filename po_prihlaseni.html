<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moodoo - Přihlášení</title>
    <script src="lang.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Aclonica&family=Encode+Sans:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        :root {
            --bg: #090909;
            --panel: rgba(0, 0, 0, 0.74);
            --accent: #D44543;
            --text: #ffffff;
            --text-muted: #cccccc;
            --border: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Encode Sans", sans-serif;
        }

        body {
            min-height: 100vh;
            content: '';
            background: linear-gradient(180deg, #12161A, rgba(0, 0, 0, 0.9)),
                url('images/image\ 21.png') center/cover no-repeat;
            background-repeat: no-repeat;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .hero-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.28), rgba(0, 0, 0, 0.92));
        }

        .hero-panel .hero-copy {
            position: relative;
            z-index: 1;
            max-width: 420px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .hero-panel h1 {
            font-size: clamp(2.5rem, 4vw, 4rem);
            line-height: 0.95;
            margin-bottom: 10px;
        }

        .hero-panel p {
            color: rgba(255, 255, 255, 0.82);
            line-height: 1.8;
            max-width: 380px;
        }

        .login-panel {
            padding: 48px;
            background: #12161A;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.45);
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            gap: 24px;
        }

        .login-panel h2 {
            font-size: 1.85rem;
            margin-bottom: 10px;
        }

        .login-panel p {
            color: var(--text-muted);
            line-height: 1.75;
        }

        .login-form {
            display: grid;
            gap: 16px;
            margin-top: 20px;
        }

        .login-form label {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .login-form input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-size: 1rem;
            outline: none;
        }

        .login-form button {
            margin-top: 8px;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .login-form button:hover {
            transform: translateY(-1px);
        }

        .message {
            margin-top: 12px;
            color: #f1f1f1;
            font-size: 0.95rem;
            min-height: 22px;
        }

        .small-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            text-align: center;
        }

        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: #DAA050;
            font-size: 0.95rem;
        }

        @media (max-width: 960px) {
            .login-shell {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 700px) {
            .hero-panel {
                min-height: 320px;
                padding: 32px;
            }

            .login-panel {
                padding: 32px;
            }

            .hero-panel .hero-copy {
                max-width: 100%;
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 16px;
            }

            .login-shell {
                gap: 18px;
            }

            .hero-panel,
            .login-panel {
                padding: 24px;
            }

            .hero-panel h1 {
                font-size: 2.5rem;
            }

            .login-panel h2 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

<body>

    <section class="login-panel">
        <div>
            <h2 data-text="loginTitle">Přihlášení</h2>
            <p class="small-text" data-text="loginSubtitle">Zadejte své údaje a pokračujte ke své oblíbené zábavě.</p>
        </div>

        <form class="login-form">
            <label for="email" data-text="labelEmail">E-mail</label>
            <input id="email" type="email" data-placeholder="emailPlaceholder" placeholder="vas@email.cz" required>

            <label for="password" data-text="labelPassword">Heslo</label>
            <input id="password" type="password" data-placeholder="passwordPlaceholder" placeholder="Heslo" required>

            <button type="submit" data-text="loginBtn">Přihlásit se</button>
            <p class="message" id="message"></p>
        </form>

        <p class="small-text"><span data-text="noAccount">Nemáte účet?</span> <a href="index.html"
                style="color:var(--accent);" data-text="startHere">Začněte zde</a></p>
        <p class="small-text" data-text="adminHint">Admin login: admin@moodoo.cz / moodoo123</p>
    </section>
    <script>
        const storedUsersKey = 'moodooUsers';
        const defaultUsers = [
            { email: 'admin@moodoo.cz', password: 'moodoo123', name: 'Moodoo Admin' }
        ];

        const getUsers = () => {
            const saved = localStorage.getItem(storedUsersKey);
            if (!saved) {
                localStorage.setItem(storedUsersKey, JSON.stringify(defaultUsers));
                return defaultUsers;
            }
            try {
                return JSON.parse(saved) || defaultUsers;
            } catch {
                localStorage.setItem(storedUsersKey, JSON.stringify(defaultUsers));
                return defaultUsers;
            }
        };

        const users = getUsers();
        const loginForm = document.querySelector('.login-form');
        const message = document.getElementById('message');

        loginForm.addEventListener('submit', (event) => {
            event.preventDefault();

            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const user = users.find(item => item.email === email && item.password === password);
            const s = MoodooLang.get(MoodooLang.getLang());

            if (user) {
                message.textContent = s.loginSuccess + user.name + '!';
                message.style.color = '#7ef3a1';
                localStorage.setItem('moodooCurrentUser', JSON.stringify({ email: user.email, name: user.name }));
                setTimeout(() => window.location.href = 'home.html', 600);
            } else {
                message.textContent = s.loginError;
                message.style.color = '#ff7f7f';
            }
        });

        MoodooLang.init();
    </script>
</body>

</html>
