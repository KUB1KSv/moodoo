<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moodoo - Přihlášení</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg: #090909;
            --panel: rgba(0, 0, 0, 0.74);
            --accent: #e50914;
            --text: #ffffff;
            --text-muted: #cccccc;
            --border: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #121212 0%, #050505 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .login-shell {
            width: min(980px, 100%);
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 32px;
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
            border: 1px solid var(--border);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 40px 120px rgba(0,0,0,0.45);
        }

        .hero-panel {
            position: relative;
            padding: 48px;
            background: url('https://images.unsplash.com/photo-1517604931442-7be35fbc83d2?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
        }

        .hero-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.28), rgba(0,0,0,0.92));
        }

        .hero-panel .hero-copy {
            position: relative;
            z-index: 1;
            max-width: 420px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .hero-panel h1 {
            font-size: clamp(2.5rem, 4vw, 4rem);
            line-height: 0.95;
            margin-bottom: 10px;
        }

        .hero-panel p {
            color: rgba(255,255,255,0.82);
            line-height: 1.8;
            max-width: 380px;
        }

        .login-panel {
            padding: 48px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .login-panel h2 {
            font-size: 1.85rem;
            margin-bottom: 10px;
        }

        .login-panel p {
            color: var(--text-muted);
            line-height: 1.75;
        }

        .login-form {
            display: grid;
            gap: 16px;
            margin-top: 20px;
        }

        .login-form label {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .login-form input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-size: 1rem;
            outline: none;
        }

        .login-form button {
            margin-top: 8px;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .login-form button:hover {
            transform: translateY(-1px);
        }

        .message {
            margin-top: 12px;
            color: #f1f1f1;
            font-size: 0.95rem;
            min-height: 22px;
        }

        .small-text {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: rgba(255,255,255,0.75);
            font-size: 0.95rem;
        }

        @media (max-width: 960px) {
            .login-shell {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 700px) {
            .hero-panel {
                min-height: 320px;
                padding: 32px;
            }

            .login-panel {
                padding: 32px;
            }

            .hero-panel .hero-copy {
                max-width: 100%;
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 16px;
            }

            .login-shell {
                gap: 18px;
            }

            .hero-panel,
            .login-panel {
                padding: 24px;
            }

            .hero-panel h1 {
                font-size: 2.5rem;
            }

            .login-panel h2 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <section class="hero-panel">
            <div class="hero-copy">
                <h1>Vítejte zpět</h1>
                <p>Otevřete si svůj účet Moodoo a získejte přístup k nejlepším filmům a seriálům, které pro vás vybíráme každý den.</p>
            </div>
        </section>

        <section class="login-panel">
            <div>
                <h2>Přihlášení</h2>
                <p class="small-text">Zadejte své údaje a pokračujte ke své oblíbené zábavě.</p>
            </div>

            <form class="login-form">
                <label for="email">E-mail</label>
                <input id="email" type="email" placeholder="vas@email.cz" required>

                <label for="password">Heslo</label>
                <input id="password" type="password" placeholder="Heslo" required>

                <button type="submit">Přihlásit</button>
                <p class="message" id="message"></p>
            </form>

            <p class="small-text">Nemáte účet? <a href="index.html" style="color: var(--accent);">Začněte zde</a></p>
            <p class="small-text">Admin login: <strong>admin@moodoo.cz</strong> / <strong>moodoo123</strong></p>
            <a class="back-link" href="index.html">← Zpět na domovskou stránku</a>
        </section>
    </div>
    <script>
        const storedUsersKey = 'moodooUsers';
        const defaultUsers = [
            { email: 'admin@moodoo.cz', password: 'moodoo123', name: 'Moodoo Admin' }
        ];

        const getUsers = () => {
            const saved = localStorage.getItem(storedUsersKey);
            if (!saved) {
                localStorage.setItem(storedUsersKey, JSON.stringify(defaultUsers));
                return defaultUsers;
            }
            try {
                return JSON.parse(saved) || defaultUsers;
            } catch {
                localStorage.setItem(storedUsersKey, JSON.stringify(defaultUsers));
                return defaultUsers;
            }
        };

        const users = getUsers();
        const loginForm = document.querySelector('.login-form');
        const message = document.getElementById('message');

        loginForm.addEventListener('submit', (event) => {
            event.preventDefault();

            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const user = users.find((item) => item.email === email && item.password === password);

            if (user) {
                message.textContent = `Přihlášení proběhlo úspěšně. Vítejte, ${user.name}!`;
                message.style.color = '#7ef3a1';
                localStorage.setItem('moodooCurrentUser', JSON.stringify({ email: user.email, name: user.name }));
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 600);
            } else {
                message.textContent = 'Nesprávný e-mail nebo heslo. Zkuste to znovu.';
                message.style.color = '#ff7f7f';
            }
        });
    </script>
</body>
</html>
